<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harf Yazalım - Eğitici Oyun</title>

    <!-- External Libraries -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <!-- Base Styles -->
    <link rel="stylesheet" href="../../assets/css/style.css">

    <!-- Game Engine Styles -->
    <link rel="stylesheet" href="../games/harf_yazalim/style.css">
</head>

<body>
    <!-- Game Mount Point -->
    <div id="game-mount-point"></div>

    <!-- Script Loading Order: 
         1. Globals & Config
         2. Dynamic Data (i.js or e.js)
         3. UI Components (Intro/Instruction)
         4. Game Engine 
    -->
    <script>
        // Set dynamic assets path
        window.ASSETS_PATH = '../../assets/';

        // Helper to load script dynamically
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = resolve;
                s.onerror = reject;
                document.body.appendChild(s);
            });
        }

        async function initGame() {
            try {
                // 1. Determine which letter to load from URL parameter
                const urlParams = new URLSearchParams(window.location.search);
                const letter = urlParams.get('letter') || 'i'; // Default to 'i'

                // 2. Load the specific data file
                await loadScript(`../../data/03_harf_yazalim/${letter}.js`);

                // 2.5 Load Main JS (for scaling and feedback)
                await loadScript('../../assets/js/main.js');
                if (window.GameEngine) window.GameEngine.init();

                // 3. Load Intro/Instruction component
                await loadScript('../games/harf_yazalim/scripts/intro.js');

                // 4. Load the core logic (Engine)
                await loadScript('../games/harf_yazalim/engine.js');

                console.log(`Game 'Harf Yazalim' initialized for letter: ${letter}`);
            } catch (error) {
                console.error("Critical error during game initialization:", error);
            }
        }

        // Start initialization
        initGame();
    </script>
</body>

</html>
