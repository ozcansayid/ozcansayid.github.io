<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etkinlik Bitiş</title>
    <link rel="stylesheet" href="https://use.typekit.net/qhw3yza.css">
    <style>
        @font-face {
            font-family: 'Quicksand';
            font-weight: 400;
            src: url('../../assets/fonts/Quicksand-Regular.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Quicksand';
            font-weight: 700;
            src: url('../../assets/fonts/Quicksand-Bold.ttf') format('truetype');
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'fillip', 'Quicksand', sans-serif;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #fff;
        }

        /* Loading state */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: rgba(255,255,255,0.7);
            margin-top: 20px;
            font-size: 1.1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Restart overlay */
        .restart-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            animation: fadeIn 0.5s ease forwards;
        }

        .restart-overlay.visible {
            display: flex;
        }

        .restart-overlay {
            padding: 20px;
        }

        .restart-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 40px;
            font-family: 'fillip', 'Quicksand', sans-serif;
            text-align: center;
            max-width: 90%;
            line-height: 1.3;
        }

        .btn-restart {
            width: 120px;
            height: 120px;
            border: none;
            border-radius: 50%;
            background-color: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-restart:hover {
            transform: scale(1.1);
        }

        .btn-restart:active {
            transform: scale(0.95);
        }

        /* Mobile & Tablet responsive */
        @media (max-width: 1024px) {
            .restart-title {
                font-size: 1.6rem;
                margin-bottom: 30px;
                max-width: 85%;
                padding: 0 16px;
            }

            .btn-restart {
                width: 100px;
                height: 100px;
            }

            .btn-restart svg {
                width: 80px;
                height: 80px;
            }
        }

        @media (max-width: 600px) {
            .restart-title {
                font-size: 1.2rem;
                margin-bottom: 24px;
                max-width: 80%;
                padding: 0 12px;
            }

            .btn-restart {
                width: 80px;
                height: 80px;
            }

            .btn-restart svg {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- Loading -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Video yükleniyor...</div>
        </div>

        <!-- Video -->
        <video id="outroVideo" playsinline preload="auto">
            <source src="../../assets/video/outro.mp4" type="video/mp4">
            Tarayıcınız video oynatmayı desteklemiyor.
        </video>

        <!-- Restart Overlay (shown after video ends) -->
        <div class="restart-overlay" id="restartOverlay">
            <div class="restart-title">Etkinliği başarıyla tamamladın!</div>
            <button class="btn-restart" onclick="restartFromBeginning()" title="Yeniden Başlat">
                <svg width="100" height="100" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <rect width="24" height="24" rx="12" fill="white" fill-opacity="0.15"/>
                    <path d="M12 4C7.58 4 4 7.58 4 12s3.58 8 8 8 8-3.58 8-8h-2c0 3.31-2.69 6-6 6s-6-2.69-6-6 2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 10h7V3l-2.64 2.64A7.95 7.95 0 0 0 12 4z" fill="white"/>
                </svg>
            </button>
        </div>
    </div>

    <script>
        // === Get letter param ===
        const urlParams = new URLSearchParams(window.location.search);
        const letter = urlParams.get('letter') || 'e';

        // === Stop BGM during outro ===
        (function() {
            var w = window;
            while (w.parent !== w) {
                try { w.parent.postMessage({ type: 'stopBGM' }, '*'); w = w.parent; } catch(e) { break; }
            }
        })();

        // === Navigate to intro (restart from beginning) ===
        function restartFromBeginning() {
            window.location.href = '../video/intro.html?letter=' + letter;
        }

        // === Show restart overlay ===
        function showRestartOverlay() {
            document.getElementById('restartOverlay').classList.add('visible');
        }

        // === Video Logic ===
        const video = document.getElementById('outroVideo');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // When video can play
        video.addEventListener('canplay', function() {
            loadingOverlay.classList.add('hidden');
        });

        // Auto-play when ready
        video.addEventListener('loadeddata', function() {
            video.play().catch(function(e) {
                console.warn('Auto-play prevented:', e);
                // If autoplay fails, show a click-to-play overlay
                loadingOverlay.innerHTML = `
                    <div style="cursor:pointer; text-align:center;" onclick="document.getElementById('outroVideo').play(); document.getElementById('loadingOverlay').classList.add('hidden');">
                        <div style="width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; margin:0 auto;">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                        <div style="color:rgba(255,255,255,0.8); margin-top:15px; font-size:1.2rem;">Oynatmak için tıklayın</div>
                    </div>
                `;
            });
        });

        // When video ends, show restart overlay
        video.addEventListener('ended', function() {
            showRestartOverlay();
        });

        // Error handling - show restart overlay if video fails
        video.addEventListener('error', function() {
            console.warn('Video yüklenemedi');
            setTimeout(showRestartOverlay, 1000);
        });
    </script>
</body>
</html>
