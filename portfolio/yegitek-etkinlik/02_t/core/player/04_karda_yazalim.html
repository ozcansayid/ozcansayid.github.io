<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karda Yazalım - Eğitici Oyun</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../games/karda_yazalim/style.css">
</head>
<body>
    <div id="game-mount-point"></div>

    <script>
        window.ASSETS_PATH = '../../assets/';

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = resolve;
                s.onerror = reject;
                document.body.appendChild(s);
            });
        }

        async function initGame() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const letter = urlParams.get('letter') || 'i';

                await loadScript(`../../data/04_karda_yazalim/${letter}.js`);
                await loadScript('../../assets/js/main.js');
                if (window.GameEngine) window.GameEngine.init();
                await loadScript('../games/karda_yazalim/scripts/intro.js');
                await loadScript('../games/karda_yazalim/engine.js');

                console.log(`Game 'Karda Yazalim' initialized for letter: ${letter}`);
            } catch (error) {
                console.error("Critical error during game initialization:", error);
            }
        }

        initGame();
    </script>
</body>
</html>
