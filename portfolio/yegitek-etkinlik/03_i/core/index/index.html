<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etkinlik Bahçesi - 1. Sınıf</title>
    <meta name="description" content="ALFEBA Okuma-Yazma Oyunu - 1. Sınıf Etkinlikleri">
    <meta property="og:title" content="Etkinlik Bahçesi - 1. Sınıf" id="og-title">
    <meta property="og:description" content="ALFEBA Okuma-Yazma Oyunu - 1. Sınıf Etkinlikleri" id="og-desc">
    <meta property="og:image" content="" id="og-image">
    <meta property="og:type" content="website">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Custom Kid Theme -->
    <link rel="stylesheet" href="../../assets/css/style.css">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #fff;
        }

        #scale-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            transform-origin: center center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        /* Top Controls */
        .top-controls {
            position: absolute;
            top: 30px;
            right: 40px;
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .btn-control {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .btn-control:hover {
            transform: scale(1.1);
            background-color: #fff;
        }

        .btn-control.active {
            background-color: #28a745;
            color: white;
        }

        /* Force container inside scale-wrapper to ignore Bootstrap responsive max-width */
        #scale-wrapper .main-container {
            width: 100% !important;
            max-width: 100% !important;
            padding: 0 320px !important;
            box-sizing: border-box !important;
        }

        /* Games Grid - fixed 4 columns, no responsive collapse */
        #games-grid {
            display: grid !important;
            grid-template-columns: repeat(4, 1fr) !important;
            gap: 28px !important;
        }

        #games-grid > .col {
            width: 100% !important;
            max-width: 100% !important;
            flex: none !important;
        }

        /* Card Overrides */
        .card-kid {
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15) !important;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .card-kid:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.2) !important;
        }

        .card-header-kid {
            font-size: 1.3rem !important;
            padding: 10px !important;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 10px;
            color: #000 !important;
        }

        .game-thumb-icon {
            font-size: 5rem;
        }

        h1.display-5 {
            text-shadow: 3px 3px 0px rgba(255, 255, 255, 0.8);
            color: #2c3e50 !important;
        }

        p.lead {
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.8);
            font-weight: 600;
            color: #34495e;
        }

        /* Header Container */
        .header-container {
            background-color: rgba(255, 255, 255, 0.75);
            padding: 20px 40px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(5px);
            margin-bottom: 30px;
        }

        /* Audio Slider Styles */
        .audio-slider-popup {
            position: absolute;
            top: 110%;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: auto;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s ease;
            z-index: 200;
            border: 1px solid #ddd;
        }

        .audio-slider-popup.show {
            opacity: 1;
            visibility: visible;
            top: 125%;
        }

        /* Arrow pointing up */
        .audio-slider-popup::after {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 6px 6px;
            border-style: solid;
            border-color: transparent transparent rgba(255, 255, 255, 0.95) transparent;
        }

        #volume-val-display {
            color: #333;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .slider-track-wrapper {
            width: 100%;
            display: flex;
            align-items: center;
        }

        .horizontal-range {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: linear-gradient(to right, #FFD700 50%, #ccc 50%);
            outline: none;
            cursor: pointer;
        }

        .horizontal-range::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.4);
            border: 2px solid #FFD700;
        }
    </style>
</head>

<body>

    <div id="scale-wrapper">

        <!-- Controls -->
        <div class="top-controls">
            <!-- Audio Container -->
            <div class="position-relative d-flex justify-content-center me-3">
                <!-- Slider Popup -->
                <div id="audio-slider-container" class="audio-slider-popup">
                    <div id="volume-val-display">20</div>
                    <div class="slider-track-wrapper">
                        <input type="range" id="volume-range" class="horizontal-range" min="0" max="100" value="20">
                    </div>
                </div>

                <button id="btn-audio-toggle" class="btn-control" title="Ses Ayarı">
                    <i class="bi bi-volume-up-fill"></i>
                </button>
            </div>

            <button id="btn-fullscreen" class="btn-control" title="Tam Ekran">
                <i class="bi bi-arrows-fullscreen"></i>
            </button>
        </div>

        <div class="main-container h-100 d-flex flex-column justify-content-center">
            <!-- Header -->
            <div class="text-center mb-4 animate-pop">
                <img id="header-img" src="" alt="Etkinlik Başlığı" class="img-fluid"
                    style="max-height: 280px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));">
            </div>

            <!-- Games Grid (Dynamically populated) -->
            <div id="games-grid">
                <!-- Cards will be injected dynamically -->
            </div>
        </div>
    </div>

    <!-- Game iframe overlay (used when fullscreen to avoid page navigation) -->
    <div id="game-iframe-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999; background:#000;">
        <iframe id="game-iframe" style="width:100%; height:100%; border:none;" allowfullscreen allow="fullscreen; autoplay"></iframe>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Dynamic Card Rendering & Interactions -->
    <script>
        (function () {
            // Get letter from URL
            const urlParams = new URLSearchParams(window.location.search);
            const letter = urlParams.get('letter') || 'e';
            
            // Map letter characters to filenames if needed (e.g. 'i' -> 'i')
            // Special handling for 'İ' (Turkish)
            let letterFile = letter.toLowerCase();
            if (letterFile === 'i' || letterFile === 'İ') letterFile = 'i';

            // Load Config
            const script = document.createElement('script');
            script.src = `../../data/index/${letterFile}.js`;
            script.onload = () => {
                renderIndex();
            };
            document.head.appendChild(script);
        })();

        function renderIndex() {
            const config = window.INDEX_CONFIG;
            if (!config) {
                console.error('INDEX_CONFIG not found.');
                return;
            }

            // Get letter from URL
            const urlParams = new URLSearchParams(window.location.search);
            const letter = urlParams.get('letter') || 'e';
            const letterFile = letter.toLowerCase();

            // --- Set background and header ---
            const wrapper = document.getElementById('scale-wrapper');
            const assetsBase = window.ASSETS_PATH || '../../assets/';
            const imgBase = assetsBase + 'img/' + config.prefix + '/index/';

            wrapper.style.backgroundImage = `url('${imgBase}${config.background}')`;
            document.getElementById('header-img').src = imgBase + config.headerImage;

            // --- Update OG tags dynamically ---
            const ogTitle = `ALFEBA Okuma-Yazma Oyunu - ${letter.toUpperCase()} Sesi`;
            document.title = ogTitle;
            const ogImg = document.getElementById('og-image');
            const ogTitleTag = document.getElementById('og-title');
            const ogDesc = document.getElementById('og-desc');
            if (ogTitleTag) ogTitleTag.setAttribute('content', ogTitle);
            if (ogDesc) ogDesc.setAttribute('content', ogTitle + ' - 1. Sınıf Etkinlikleri');
            if (ogImg) ogImg.setAttribute('content', assetsBase + 'img/' + config.prefix + '/cover.png');

            // --- Render game cards ---
            const grid = document.getElementById('games-grid');
            grid.innerHTML = ''; // Clear

            config.games.forEach(function (game) {
                const iconPath = imgBase + game.icon;
                
                const activityName = game.folder.replace(config.prefix + '_', '');

                const textClass = game.textWhite !== false ? 'text-white' : '';

                const col = document.createElement('div');
                col.className = 'col';
                col.innerHTML = `
                    <div class="card card-kid h-100 border-0">
                        <div class="card-header-kid py-3 fw-bold ${textClass}"
                            style="background-color: ${game.color};">
                            <span>${game.name}</span>
                        </div>
                        <div class="card-body text-center p-4">
                            <div class="game-thumb rounded mb-3 d-flex align-items-center justify-content-center"
                                style="background-color: ${game.bgLight}; color: ${game.color}; height: 120px;">
                                <img src="${iconPath}" alt="${game.name}"
                                    class="img-fluid" style="max-height: 90%; max-width: 90%;">
                            </div>
                            <a href="#" data-game="${activityName}" data-letter="${letterFile}"
                                onclick="launchGame(this, ${game.id}); return false;"
                                class="btn btn-kid btn-primary-kid w-100">
                                OYNA <i class="bi bi-play-fill"></i>
                            </a>
                        </div>
                    </div>`;
                grid.appendChild(col);
            });
            
            // Re-run resize
            resize();
        }

        // --- Game Launcher ---
        function launchGame(el, gameId) {
            updateStorylineVariable(gameId);
            const gameName = el.getAttribute('data-game');
            const gameLetter = el.getAttribute('data-letter');

            // If fullscreen, load in iframe overlay to preserve fullscreen
            if (document.fullscreenElement) {
                const overlay = document.getElementById('game-iframe-overlay');
                const iframe = document.getElementById('game-iframe');
                iframe.src = `../player/player.html?game=${gameName}&letter=${gameLetter}&embedded=true`;
                overlay.style.display = 'block';
                // Store current game info for navigation
                overlay.dataset.currentGame = gameName;
                overlay.dataset.letter = gameLetter;
            } else {
                // Normal navigation via unified player
                window.location.href = `../player/player.html?game=${gameName}&letter=${gameLetter}`;
            }
        }

        // Handle messages from iframe games
        const GAMES_LIST = ['01_sesi_hissedelim','02_harf_taniyalim','03_harf_yazalim','04_karda_yazalim','05_hece_sozcuk','06_sozcuk_olusturma','07_okuyalim','08_ritmik_okuma'];

        window.addEventListener('message', function(e) {
            if (!e.data || !e.data.type) return;
            const overlay = document.getElementById('game-iframe-overlay');
            const iframe = document.getElementById('game-iframe');
            const letter = overlay.dataset.letter || 'e';

            if (e.data.type === 'goHome') {
                // Hide iframe, show index
                overlay.style.display = 'none';
                iframe.src = '';
            }
            if (e.data.type === 'navigate') {
                // Load new game in iframe via unified player
                iframe.src = `../player/player.html?game=${e.data.game}&letter=${letter}&embedded=true`;
                overlay.dataset.currentGame = e.data.game;
            }
            if (e.data.type === 'goOutro') {
                // Navigate to outro video page
                window.location.href = `../video/outro.html?letter=${e.data.letter || letter}`;
            }
            if (e.data.type === 'toggleFullscreen') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().then(() => {
                        localStorage.setItem('isFullscreen', 'true');
                    }).catch(err => console.warn('Fullscreen failed:', err));
                } else {
                    document.exitFullscreen();
                    localStorage.setItem('isFullscreen', 'false');
                }
            }
        });

        // Sync fullscreen state to iframe
        document.addEventListener('fullscreenchange', function() {
            const iframe = document.getElementById('game-iframe');
            if (iframe && iframe.contentWindow) {
                iframe.contentWindow.postMessage({ type: 'fullscreenChanged', isFullscreen: !!document.fullscreenElement }, '*');
            }
        });

        // --- Storyline Interaction ---

        // Helper: send postMessage to ALL parent frames
        function postToAllParents(msg) {
            var w = window;
            while (w.parent !== w) {
                try { w.parent.postMessage(msg, '*'); w = w.parent; } catch(e) { break; }
            }
        }

        // Start BGM (send to SCORM wrapper)
        postToAllParents({ type: 'startBGM' });
        function updateStorylineVariable(id) {
            try {
                var player = null;
                if (window.GetPlayer) player = window.GetPlayer();
                else if (window.parent && window.parent.GetPlayer) player = window.parent.GetPlayer();

                if (player) {
                    player.SetVar("game_id", id);
                    console.log("Storyline variable 'game_id' updated to: " + id);
                }
            } catch (e) {
                console.warn("Storyline communication error:", e);
            }
        }

        // --- Fullscreen Toggle ---
        const btnFullscreen = document.getElementById('btn-fullscreen');
        if (btnFullscreen) {
            // Sync icon on load
            if (document.fullscreenElement) {
                btnFullscreen.innerHTML = '<i class="bi bi-fullscreen-exit"></i>';
            }
            btnFullscreen.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().then(() => {
                        localStorage.setItem('isFullscreen', 'true');
                    }).catch(err => console.warn('Fullscreen failed:', err));
                } else {
                    document.exitFullscreen();
                    localStorage.setItem('isFullscreen', 'false');
                }
            });
            document.addEventListener('fullscreenchange', () => {
                btnFullscreen.innerHTML = document.fullscreenElement
                    ? '<i class="bi bi-fullscreen-exit"></i>'
                    : '<i class="bi bi-arrows-fullscreen"></i>';
            });


        }

        // --- Audio Slider Logic ---
        (function () {
            const btn = document.getElementById('btn-audio-toggle');
            const popup = document.getElementById('audio-slider-container');
            const range = document.getElementById('volume-range');
            const valDisplay = document.getElementById('volume-val-display');
            let isOpen = false;

            if (btn) {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    isOpen = !isOpen;
                    togglePopup(isOpen);
                });
                document.addEventListener('click', (e) => {
                    if (isOpen && popup && !popup.contains(e.target) && !btn.contains(e.target)) {
                        isOpen = false;
                        togglePopup(false);
                    }
                });
                if (popup) popup.addEventListener('click', (e) => e.stopPropagation());
            }

            function togglePopup(show) {
                if (!popup) return;
                if (show) popup.classList.add('show');
                else popup.classList.remove('show');
            }

            if (range) {
                range.addEventListener('input', function () { updateVolume(this.value, true); });

                // Init from localStorage (SCORM/standalone)
                const savedVol = localStorage.getItem('bg_music_volume');
                if (savedVol !== null) {
                    range.value = Number(savedVol);
                } else {
                    range.value = 20;
                    localStorage.setItem('bg_music_volume', '20');
                }

                // Init UI
                updateVolume(range.value, false);
            }

            function updateVolume(val, syncToStoryline) {
                if (!range) return;
                const percent = val;

                const color = "#FFD700";
                const empty = "#ccc";
                range.style.background = `linear-gradient(to right, ${color} 0%, ${color} ${percent}%, ${empty} ${percent}%, ${empty} 100%)`;

                if (valDisplay) valDisplay.innerText = val;

                // Toggle Icon
                if (btn) {
                    if (Number(val) === 0) {
                        btn.innerHTML = '<i class="bi bi-volume-mute-fill"></i>';
                    } else {
                        btn.innerHTML = '<i class="bi bi-volume-up-fill"></i>';
                    }
                }

                // Sync BGM volume to SCORM wrapper
                localStorage.setItem('bg_music_volume', String(Number(val)));
                postToAllParents({ type: 'setBGMVolume', volume: Number(val) });
            }
        })();

        // --- Scaling ---
        function resize() {
            const wrapper = document.getElementById('scale-wrapper');
            if (!wrapper) return;
            const targetWidth = 1920;
            const targetHeight = 1080;
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const scale = Math.min(windowWidth / targetWidth, windowHeight / targetHeight);
            wrapper.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }

        window.addEventListener('resize', resize);
        window.addEventListener('load', resize);
    </script>
</body>

</html>
