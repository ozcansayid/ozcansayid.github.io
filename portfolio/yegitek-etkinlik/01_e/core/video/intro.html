<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etkinlik Başlangıç</title>
    <link rel="stylesheet" href="https://use.typekit.net/qhw3yza.css">
    <style>
        @font-face {
            font-family: 'Quicksand';
            font-weight: 400;
            src: url('../../assets/fonts/Quicksand-Regular.ttf') format('truetype');
        }

        @font-face {
            font-family: 'Quicksand';
            font-weight: 700;
            src: url('../../assets/fonts/Quicksand-Bold.ttf') format('truetype');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'fillip', 'Quicksand', sans-serif;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        /* Cover image as background */
        .cover-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #fff;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #fff;
            display: none;
        }

        video.active {
            display: block;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* Play overlay - shown initially */
        .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.40);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            cursor: pointer;
            transition: opacity 0.4s ease;
            padding: 20px;
        }

        .play-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .play-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 40px;
            font-family: 'fillip', 'Quicksand', sans-serif;
            text-align: center;
            max-width: 90%;
            line-height: 1.3;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .btn-play {
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.95);
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25), 0 0 0 4px rgba(255, 255, 255, 0.5);
        }

        .btn-play:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 32px rgba(0, 0, 0, 0.3), 0 0 0 6px rgba(255, 255, 255, 0.6);
        }

        .btn-play:active {
            transform: scale(0.95);
        }

        /* Mobile & Tablet responsive */
        @media (max-width: 1024px) {
            .play-title {
                font-size: 1.6rem;
                margin-bottom: 30px;
                max-width: 85%;
                padding: 0 16px;
            }

            .btn-play {
                width: 100px;
                height: 100px;
            }

            .btn-play svg {
                width: 80px;
                height: 80px;
            }
        }

        @media (max-width: 600px) {
            .play-title {
                font-size: 1.2rem;
                margin-bottom: 24px;
                max-width: 80%;
                padding: 0 12px;
            }

            .btn-play {
                width: 80px;
                height: 80px;
            }

            .btn-play svg {
                width: 64px;
                height: 64px;
            }
        }
    </style>
</head>

<body>

    <div class="video-container" aria-hidden="true">
        <!-- Cover Image -->
        <img class="cover-image" id="coverImage" src="" alt="" />

        <!-- Video (hidden initially) -->
        <video id="introVideo" playsinline preload="auto">
            <source src="../../assets/video/intro.mp4" type="video/mp4">
            Tarayıcınız video oynatmayı desteklemiyor.
        </video>

        <!-- Play Overlay -->
        <div class="play-overlay" id="playOverlay">
            <button class="btn-play" onclick="startVideo()" title="Başlat" tabindex="-1">
                <svg width="40" height="40" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 5v14l11-7z" fill="#333" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Erişilebilirlik: Ekran okuyucu uyarısı -->
    <a href="#" onclick="goToIndex(); return false;" 
       style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;"
       aria-label="Bu etkinlik erişilebilirliğe uygun değildir. Anasayfaya dönmek için tıklayın.">
       Bu etkinlik erişilebilirliğe uygun değildir
    </a>

    <script>
        // === Letter-to-folder mapping ===
        const letterPrefixMap = {
            'e': '01_e',
            't': '02_t',
            'i': '03_i'
        };

        // === Get letter param ===
        const urlParams = new URLSearchParams(window.location.search);
        const letter = urlParams.get('letter') || 'e';
        const prefix = letterPrefixMap[letter.toLowerCase()] || '01_e';

        // === Set cover image ===
        document.getElementById('coverImage').src = '../../assets/img/' + prefix + '/cover.png';



        // === Stop BGM during intro & reset volume to 20% ===
        localStorage.setItem('bg_music_volume', '20');
        (function () {
            var w = window;
            while (w.parent !== w) {
                try {
                    w.parent.postMessage({ type: 'stopBGM' }, '*');
                    w.parent.postMessage({ type: 'setBGMVolume', volume: 20 }, '*');
                    w = w.parent;
                } catch (e) { break; }
            }
        })();

        // === Navigate to index ===
        function goToIndex() {
            window.location.href = '../index/index.html?letter=' + letter;
        }

        // === Video Logic ===
        const video = document.getElementById('introVideo');
        const coverImage = document.getElementById('coverImage');
        const playOverlay = document.getElementById('playOverlay');

        // Start video from button click
        function startVideo() {
            // Hide cover, show video
            coverImage.style.display = 'none';
            video.classList.add('active');

            video.play().then(function () {
                playOverlay.classList.add('hidden');
            }).catch(function (e) {
                console.warn('Play failed:', e);
                // If video can't play, go directly to index
                goToIndex();
            });
        }

        // When video ends, go to index
        video.addEventListener('ended', function () {
            goToIndex();
        });

        // Error handling - skip to index if video fails
        video.addEventListener('error', function () {
            console.warn('Video yüklenemedi, index sayfasına yönlendiriliyor...');
            setTimeout(goToIndex, 1000);
        });
    </script>
</body>

</html>
