<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ritmik Okuma</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../games/ritmik_okuma/style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div id="game-mount-point"></div>

    <script>
        window.ASSETS_PATH = '../../assets/';

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = resolve;
                s.onerror = reject;
                document.body.appendChild(s);
            });
        }

        async function initGame() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const letter = urlParams.get('letter') || 'i';

                await loadScript(`../../data/08_ritmik_okuma/${letter}.js`);
                await loadScript('../../assets/js/main.js');
                if (window.GameEngine) window.GameEngine.init();
                await loadScript('../games/ritmik_okuma/scripts/intro.js');
                await loadScript('../games/ritmik_okuma/engine.js');

                console.log(`Game 'Ritmik Okuma' initialized for letter: ${letter}`);
            } catch (error) {
                console.error("Critical error during game initialization:", error);
            }
        }

        initGame();
    </script>
</body>
</html>
