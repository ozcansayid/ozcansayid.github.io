<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFEBA Okuma-Yazma Oyunu - E Sesi</title>
    <meta name="description" content="ALFEBA Okuma-Yazma Oyunu - E Sesi - 1. SÄ±nÄ±f Okuma Yazma Etkinlikleri">
    <meta property="og:title" content="ALFEBA Okuma-Yazma Oyunu - E Sesi">
    <meta property="og:description" content="ALFEBA Okuma-Yazma Oyunu - E Sesi Etkinlikleri">
    <meta property="og:image" content="assets/img/01_e/cover.png">
    <meta property="og:type" content="website">
    <script src="scorm_api.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>
    <iframe id="content-frame" src="core/video/intro.html?letter=e" allowfullscreen allow="fullscreen; autoplay"></iframe>
    <script>
        // ===== Background Music Manager =====
        var bgmTracks = ['assets/audio/bgm/1.mp3', 'assets/audio/bgm/2.mp3', 'assets/audio/bgm/3.mp3', 'assets/audio/bgm/4.mp3'];
        var bgmAudio = null;
        var bgmCurrentTrack = 0;
        var bgmPlaying = false;

        function initBGM() {
            if (bgmTracks.length === 0) return;
            bgmAudio = new Audio();
            bgmAudio.loop = false;

            // Load saved volume from localStorage (default 20%)
            var savedVol = localStorage.getItem('bg_music_volume');
            bgmAudio.volume = savedVol !== null ? Number(savedVol) / 100 : 0.2;

            // When a track ends, play the next one (loop)
            bgmAudio.addEventListener('ended', function() {
                bgmCurrentTrack = (bgmCurrentTrack + 1) % bgmTracks.length;
                bgmAudio.src = bgmTracks[bgmCurrentTrack];
                bgmAudio.play().catch(function(){});
            });
        }

        function startBGM() {
            if (!bgmAudio) initBGM();
            if (!bgmAudio || bgmTracks.length === 0) return;
            if (!bgmPlaying) {
                bgmAudio.src = bgmTracks[bgmCurrentTrack];
                bgmAudio.play().catch(function(e) {
                    console.warn('BGM autoplay prevented:', e);
                });
                bgmPlaying = true;
            }
        }

        function stopBGM() {
            if (bgmAudio) {
                bgmAudio.pause();
                bgmPlaying = false;
            }
        }

        function setBGMVolume(percent) {
            if (bgmAudio) {
                bgmAudio.volume = Math.max(0, Math.min(100, Number(percent))) / 100;
            }
            localStorage.setItem('bg_music_volume', String(percent));
        }

        // ===== Message Handler =====
        window.addEventListener('message', function(e) {
            if (!e.data || !e.data.type) return;
            var iframe = document.getElementById('content-frame');

            // BGM controls
            if (e.data.type === 'startBGM') startBGM();
            if (e.data.type === 'stopBGM') stopBGM();
            if (e.data.type === 'setBGMVolume') setBGMVolume(e.data.volume);

            // Fullscreen relay
            if (e.data.type === 'toggleFullscreen') {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(function(){});
                } else {
                    document.exitFullscreen();
                }
            }
        });
    </script>
</body>
</html>
