<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etkinlik Başlangıç</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #fff;
        }

        /* Loading state */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: rgba(255,255,255,0.7);
            margin-top: 20px;
            font-size: 1.1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- Loading -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Video yükleniyor...</div>
        </div>

        <!-- Video -->
        <video id="introVideo" playsinline preload="auto">
            <source src="../../assets/video/intro.mp4" type="video/mp4">
            Tarayıcınız video oynatmayı desteklemiyor.
        </video>

    </div>

    <script>
        // === Get letter param ===
        const urlParams = new URLSearchParams(window.location.search);
        const letter = urlParams.get('letter') || 'e';

        // === Stop BGM during intro & reset volume to 20% ===
        localStorage.setItem('bg_music_volume', '20');
        (function() {
            var w = window;
            while (w.parent !== w) {
                try {
                    w.parent.postMessage({ type: 'stopBGM' }, '*');
                    w.parent.postMessage({ type: 'setBGMVolume', volume: 20 }, '*');
                    w = w.parent;
                } catch(e) { break; }
            }
        })();

        // === Navigate to index ===
        function goToIndex() {
            window.location.href = '../index/index.html?letter=' + letter;
        }

        // === Video Logic ===
        const video = document.getElementById('introVideo');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // When video can play
        video.addEventListener('canplay', function() {
            loadingOverlay.classList.add('hidden');
        });

        // Auto-play when ready
        video.addEventListener('loadeddata', function() {
            video.play().catch(function(e) {
                console.warn('Auto-play prevented:', e);
                // If autoplay fails, show a click-to-play overlay
                loadingOverlay.innerHTML = `
                    <div style="cursor:pointer; text-align:center;" onclick="document.getElementById('introVideo').play(); document.getElementById('loadingOverlay').classList.add('hidden');">
                        <div style="width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; margin:0 auto;">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                        <div style="color:rgba(255,255,255,0.8); margin-top:15px; font-size:1.2rem;">Oynatmak için tıklayın</div>
                    </div>
                `;
            });
        });

        // When video ends, go to index
        video.addEventListener('ended', function() {
            goToIndex();
        });

        // Error handling - skip to index if video fails
        video.addEventListener('error', function() {
            console.warn('Video yüklenemedi, index sayfasına yönlendiriliyor...');
            setTimeout(goToIndex, 1000);
        });
    </script>
</body>
</html>
