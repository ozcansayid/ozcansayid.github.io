<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etkinlik Bitiş</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #fff;
        }

        /* Loading state */
        .loading-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            transition: opacity 0.5s ease;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            color: rgba(255,255,255,0.7);
            margin-top: 20px;
            font-size: 1.1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Restart overlay */
        .restart-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
            animation: fadeIn 0.5s ease forwards;
        }

        .restart-overlay.visible {
            display: flex;
        }

        .restart-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 40px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .btn-restart {
            width: 120px;
            height: 120px;
            border: none;
            border-radius: 50%;
            background-color: #FF9F1C;
            color: #fff;
            font-size: 3.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 0 #cc7a00, 0 12px 20px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-restart:hover {
            background-color: #ff8c00;
            transform: translateY(-2px);
            box-shadow: 0 10px 0 #cc7a00, 0 16px 25px rgba(0, 0, 0, 0.4);
        }

        .btn-restart:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #cc7a00, 0 4px 8px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="video-container">
        <!-- Loading -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">Video yükleniyor...</div>
        </div>

        <!-- Video -->
        <video id="outroVideo" playsinline preload="auto">
            <source src="../../assets/video/outro.mp4" type="video/mp4">
            Tarayıcınız video oynatmayı desteklemiyor.
        </video>

        <!-- Restart Overlay (shown after video ends) -->
        <div class="restart-overlay" id="restartOverlay">
            <div class="restart-title">Etkinliği başarıyla tamamladın!</div>
            <button class="btn-restart" onclick="restartFromBeginning()" title="Yeniden Başlat">
                &#x21bb;
            </button>
        </div>
    </div>

    <script>
        // === Get letter param ===
        const urlParams = new URLSearchParams(window.location.search);
        const letter = urlParams.get('letter') || 'e';

        // === Stop BGM during outro ===
        (function() {
            var w = window;
            while (w.parent !== w) {
                try { w.parent.postMessage({ type: 'stopBGM' }, '*'); w = w.parent; } catch(e) { break; }
            }
        })();

        // === Navigate to intro (restart from beginning) ===
        function restartFromBeginning() {
            window.location.href = '../video/intro.html?letter=' + letter;
        }

        // === Show restart overlay ===
        function showRestartOverlay() {
            document.getElementById('restartOverlay').classList.add('visible');
        }

        // === Video Logic ===
        const video = document.getElementById('outroVideo');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // When video can play
        video.addEventListener('canplay', function() {
            loadingOverlay.classList.add('hidden');
        });

        // Auto-play when ready
        video.addEventListener('loadeddata', function() {
            video.play().catch(function(e) {
                console.warn('Auto-play prevented:', e);
                // If autoplay fails, show a click-to-play overlay
                loadingOverlay.innerHTML = `
                    <div style="cursor:pointer; text-align:center;" onclick="document.getElementById('outroVideo').play(); document.getElementById('loadingOverlay').classList.add('hidden');">
                        <div style="width:80px; height:80px; border-radius:50%; background:rgba(255,255,255,0.2); display:flex; align-items:center; justify-content:center; margin:0 auto;">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                        <div style="color:rgba(255,255,255,0.8); margin-top:15px; font-size:1.2rem;">Oynatmak için tıklayın</div>
                    </div>
                `;
            });
        });

        // When video ends, show restart overlay
        video.addEventListener('ended', function() {
            showRestartOverlay();
        });

        // Error handling - show restart overlay if video fails
        video.addEventListener('error', function() {
            console.warn('Video yüklenemedi');
            setTimeout(showRestartOverlay, 1000);
        });
    </script>
</body>
</html>
